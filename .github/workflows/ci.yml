name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  smoke:
    name: Smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Syntax check
        run: |
          bash -n gsu
          bash -n install.sh
          bash -n uninstall.sh

      - name: Install gsu (local temp dir)
        run: |
          export GSU_INSTALL_DIR="$RUNNER_TEMP/bin"
          export GSU_NO_SHELL_HOOK=1
          export GSU_NO_COMPLETIONS=1
          bash ./install.sh
          echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"

      - name: Smoke test
        run: |
          gsu --version
          gsu -v
          gsu version
          gsu help >/dev/null
          gsu list >/dev/null || true

  lint:
    name: Shellcheck (ubuntu)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Lint scripts
        run: shellcheck -s bash gsu install.sh uninstall.sh
